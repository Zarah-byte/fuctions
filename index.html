<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Punchy</title>
	
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<link href="assets/reset.css" rel="stylesheet">
	<link href="assets/style.css" rel="stylesheet">
	<script defer src="assets/main.js"></script>
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Annie+Use+Your+Telescope&family=Bagel+Fat+One&family=Londrina+Shadow&family=Miniver&display=swap" rel="stylesheet">
</head>
<body>
	<main>
		<section id="cover" class="show">
			<h1>Punch</h1>
			<p>Hi there!<br>Welcome to Punchy!</p>
			<p>here is how this works</p>
			<ul>
				<li>
					<em>Step 1</em> type your goal 
				</li>
				<li>
					<em>Step 2</em> pick how many times you want to achieve your goal
				</li>
				<li>
					<em>Step 3</em> customize! 
				</li>
				<li>
					<em>Step 4</em> print
				</li>
			</ul>

			<button id="step-01" type="button">
				<p>Lets get started!</p>
			</button>
		</section>

			<form>
				<section id="goal-title" class="hidden">
					<label for="goal-text">Add your goal!</label>
					<input id="goal-text" name="goal" type="text" placeholder="Type here" required>

					<div class="back-next-button">
						<button section="back">
							<p>back</p>
						</button>
						<button id="step-02" type="button">
							<p>Next</p>
						</button>
					</div>
				</section>

				<section id="reward-title" class="hidden">
					<label for="reward-text">Add your reward!</label>
					<input id="reward-text" name="reward" type="text" placeholder="e.g. Buy new boots!" required>
					
					<div class="back-next-button">
						<button section="back">
							<p>back</p>
						</button>
						<button id="step-03" type="button">
							<p>Next</p>
						</button>
					</div>
				</section>
<!--  FIGURE OUT FUCTIONALITY 
				<section class="goal-font">
					<p>Select a font</p>
					<ul>
						<li><button class="font-btn selected" data-font="londrina-shadow" type="button">Londrina Shadow</button></li>
						
						<li><button class="font-btn" data-font="bagel-fat-one" type="button">Bagel Fat One</button></li>
						
						<li><button class="font-btn" data-font="annie" type="button">Annie</button></li>
						
						<li><button class="font-btn" data-font="miniver" type="button">Miniver</button></li>
					</ul>
				</section> -->

				<section id="goal-number" class="hidden">
					<p>How many times do you want to achieve your goal?</p>
					<ul>
						<li><button class="count-btn" data-count="1" type="button">1</button></li>
						<li><button class="count-btn" data-count="2" type="button">2</button></li>
						<li><button class="count-btn" data-count="3" type="button">3</button></li>
						<li><button class="count-btn" data-count="4" type="button">4</button></li>
						<li><button class="count-btn" data-count="5" type="button">5</button></li>
						<li><button class="count-btn" data-count="6" type="button">6</button></li>
						<li><button class="count-btn" data-count="7" type="button">7</button></li>
						<li><button class="count-btn" data-count="8" type="button">8</button></li>
					</ul>

					<div class="back-next-button">
						<button section="back">
							<p>back</p>
						</button>
						<button id="step-04" type="button">
							<p>Next</p>
						</button>
					</div>
				</section>

				<section id="goal-icon" class="hidden">
					<p>Add an icon!</p>
					<ul>
						<li><button class="icon-btn selected" data-icon="star" type="button">★</button></li>
						<li><button class="icon-btn" data-icon="smiley" type="button">🙂</button></li>
						<li><button class="icon-btn" data-icon="heart" type="button">♥</button></li>
						<li><button class="icon-btn" data-icon="check" type="button">✓</button></li>
					</ul>

					<div class="back-next-button">
						<button section="back">
							<p>back</p>
						</button>
						<button id="step-05" type="button">
							<p>Next</p>
						</button>
					</div>
				</section>

				<section id="goal-color" class="hidden">
					<label for="goal-color-picker">Pick a text color</label>
					<input id="goal-color-picker" type="color" value="#ff0000">

					<div class="back-next-button">
						<button section="back">
							<p>back</p>
						</button>
						<button id="step-06" type="button">
							<p>Next</p>
						</button>
					</div>
				</section>

				<section id="card-color" class="hidden">
					<label for="card-color-picker">Pick a card color</label>
					<input id="card-color-picker" name="card-color" type="color" value="#cccccc">

					<div class="back-next-button">
						<button section="back">
							<p>back</p>
						</button>
						<button id="step-07" type="button">
							<p>Make my Card!</p>
						</button>
					</div>
				</section>
			</form>
